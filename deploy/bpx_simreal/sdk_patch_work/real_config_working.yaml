profile:
  name: BPX XWK Sim2Real Workstation
  author: xwk
  robot: C2P1 / BPX wheel-leg
  urdf_path: urdf/c2p1.urdf
  formula: q_sim = scale * q_raw + offset
  inverse_formula: q_raw_cmd = (q_sim_cmd - offset) / scale
  sdk_public_joint_dof: 12
  ui_joint_dof: 16
  note: 'Public bpx_sdk_open JointLevelControl exposes 12-DOF joint arrays. This workstation
    visualizes 16 URDF joints and reserves four ankle/wheel joints, but real SDK joint
    commands are limited to the first verified 12 leg joints until the wheel/16-DOF
    API is available.

    '
isaaclab_policy_contract:
  action_formula: q_des_sim = default_joint_pos + clip(action,-clip,clip) * action_scale
  action_scale: 0.3799544386804864
  obs_order:
  - root_ang_vel_b * 0.2
  - projected_gravity_b * 1.0
  - command_xy_yaw * [1.0, 1.0, 1.0]
  - joint_pos_minus_default * 1.0
  - joint_vel * 0.05
  - last_action * 1.0
  dwaq_history_length: 15
  actor_obs_single_frame_dim: 45
  encoder_input_dim: 675
  policy_input_mode: auto
  supported_policy_input_dims:
    history_only: 675
    current_plus_history: 720
  warning: true-real deploy must build q_sim from calibrated raw joints, never raw
    SDK joint values.
  scale_note: 'Current policy is exported from IsaacLab WAQ model_42000.pt:
    omega*0.2, gravity*1, command*[1,1,1], qpos*1, qvel*0.05, last_action*1, action_scale=0.3799544386804864.'
  command_scale:
    vx: 1.0
    vy: 1.0
    wz: 1.0
    mode: IsaacLab WAQ export defaults
  action_formula_sim2sim_exact: target_joint_pos = DEFAULT_JOINT_POS + np.clip(policy(obs_history),
    -clip_actions, clip_actions) * action_scale
  sim_clip_actions: 100.0
  deploy_action_guard:
    enabled: true
    clip: 0.12
    meaning: EXTRA REAL ROBOT SAFETY GUARD. This is NOT sim2sim clip_actions. Disable
      only when hanging and verifying strict sim2sim contract.
    last_action_source_when_enabled: sent_action
    last_action_source_when_disabled: sim_action
    target_rate_limit_enabled: true
  strict_notes:
  - clip_actions is the sim2sim/training action clip; in the demo it is 100.0 and
    is applied before action_scale.
  - deploy_action_guard is an extra real-robot safety guard and must not be confused
    with clip_actions.
  - default_joint_pos must match the exported IsaacLab policy metadata.
  - action order must be IsaacLab type-major JOINT_NAMES; SDK order is grouped by leg via sdk_index.
  - URDF limits are used for sim soft clamping before raw SDK conversion.
  source: EXPORTED_FROM /home/ubuntu/isaaclab_waq/logs/waq/bpx_waq_rough/2026-06-09_18-19-51/model_42000.pt
  joint_order_source: IsaacLab WAQ export metadata
  rl_joint_order_12: &id001
  - fl_hip_roll_joint
  - fr_hip_roll_joint
  - hl_hip_roll_joint
  - hr_hip_roll_joint
  - fl_hip_pitch_joint
  - fr_hip_pitch_joint
  - hl_hip_pitch_joint
  - hr_hip_pitch_joint
  - fl_knee_joint
  - fr_knee_joint
  - hl_knee_joint
  - hr_knee_joint
  default_joint_pos:
    fl_hip_roll_joint: 0.0
    fr_hip_roll_joint: 0.0
    hl_hip_roll_joint: 0.0
    hr_hip_roll_joint: 0.0
    fl_hip_pitch_joint: 0.6
    fr_hip_pitch_joint: 0.6
    hl_hip_pitch_joint: 0.6
    hr_hip_pitch_joint: 0.6
    fl_knee_joint: -1.2
    fr_knee_joint: -1.2
    hl_knee_joint: -1.2
    hr_knee_joint: -1.2
  default_joint_pos_note: Exported IsaacLab WAQ policy default_joint_pos. hip_roll defaults are 0.0.
  strict_sim2sim_demo_input_dim: 675
  preferred_policy_input_mode_for_demo: history_only
  clip_actions: 100.0
  clip_obs: 100.0
  obs_scales:
    ang_vel: 0.2
    projected_gravity: 1.0
    lin_vel_command_x: 1.0
    lin_vel_command_y: 1.0
    ang_vel_command_z: 1.0
    joint_pos: 1.0
    joint_vel: 0.05
    last_action: 1.0
  sim_pd:
    kp: 19.739208801050342
    kd: 1.2566370614
    torque_formula: torque = kp * (target_joint_pos - joint_pos) - kd * joint_vel
  sim_timing:
    sim_dt: 0.005
    decimation: 4
    policy_dt: 0.02
    policy_hz: 50.0
rl_joint_order_12: *id001
